site_name: Grupo Betty Snyder

site_url: https://fcte-qualidade-de-software-1.github.io/2026-1_T01_BETTY_SNYDER/

theme:
  name: material

  palette:
    # Tema claro
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Modo escuro

    # Tema escuro
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Modo claro

  icon:
    logo: material/source-branch

nav:
  - Início: inicio.md
  - Tabela de Contribuição: contribuicao.md
  - "Fase 1 - Processo de Avaliação":
    - Contextualização do Projeto e do Sistema: fase1/fase1_contextualizacao.md
    - Partes Interessadas: fase1/fase1_stakeholders.md
    - Modelo de Qualidade Adotado: fase1/fase1_modelo.md
    - Descrição Estruturada do Software: fase1/fase1_descricao.md
    - Escopo, Profundidade e Objetivos da Avaliação: fase1/fase1_escopo.md
    - Objetivos de Desenvolvimento Sustentável (ODS) Relacionados: fase1/fase1_ods.md

markdown_extensions:
  - md_in_html
