site_name: Grupo Betty Snyder

site_url: https://fcte-qualidade-de-software-1.github.io/2026-1_T01_BETTY_SNYDER/

theme:
  name: material

  palette:
    # Tema claro
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Modo escuro

    # Tema escuro
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Modo claro

  icon:
    logo: material/source-branch

nav:
  - Início: inicio.md
  - "Fase 1 - Processo de Avaliação": fase1.md

markdown_extensions:
  - md_in_html
